<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTM by Kidaevv (Volleyball Tactic Maker)</title>
    <link rel="icon" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <link rel="stylesheet" href="style.css">
    <script src="scirpt.js" defer></script>
</head>
<body>
    <div class="players-container">
        <div class="player s">С</div>
        <div class="player op">Диг</div>
        <div class="player mb">ЦБ</div>
        <div class="player oh">Д</div>
        <div class="player l">Л</div>
        <div class="player custom">N/A</div>
        <img class="ball" src="favicon.png" alt="мяч">
    </div>
    <main>
        <div class="field">
            <div class="lines-container">
                <div class="line"></div>
                <div class="net"></div>
                <div class="line"></div>
            </div>
        </div>
    </main>
    <div class="btn-container">
        <button>Reset</button>
        <button>Default</button>
    </div>
</body>
</html>
